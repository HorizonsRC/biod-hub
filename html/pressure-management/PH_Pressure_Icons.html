<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Management Pressures</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'DM Sans',sans-serif;background:#1a1a2e}

    .grid{
      height:100%;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:repeat(4,1fr);
      gap:3px;
      background:#1a1a2e;
      padding:3px;
    }

    /* deer spans full top row, fragmentation spans full bottom row */
    .card:first-child,
    .card:last-child{
      grid-column:1 / -1;
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:5px;
    }

    .card img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
      transition:transform .4s ease;
    }

    .card:hover img{
      transform:scale(1.04);
    }

    /* gradient overlay at bottom */
    .card::after{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(
        to bottom,
        transparent 40%,
        rgba(26,26,46,.75) 100%
      );
      pointer-events:none;
    }

    .label{
      position:absolute;
      bottom:0;
      left:0;
      right:0;
      z-index:2;
      padding:6px 8px 5px;
      display:flex;
      align-items:flex-end;
      gap:6px;
    }

    .accent{
      width:3px;
      height:100%;
      min-height:28px;
      border-radius:2px;
      flex-shrink:0;
    }

    .label-text{
      font-size:.7rem;
      font-weight:600;
      color:#fff;
      line-height:1.2;
      text-shadow:0 1px 3px rgba(0,0,0,.6);
    }
  </style>
</head>
<body>
<div class="grid">

  <!-- Ungulates — deer spans full width -->
  <div class="card">
    <img src="images/640px-Altenfelden_Rothirsch_Cervus_elaphus-2094.jpg" alt="Deer">
    <div class="label">
      <div class="accent" style="background:#2166AC"></div>
      <div class="label-text">Ungulates</div>
    </div>
  </div>

  <!-- Rabbits / Hares -->
  <div class="card">
    <img src="images/Feldhase.jpg" alt="Hare">
    <div class="label">
      <div class="accent" style="background:#F4D03F"></div>
      <div class="label-text">Rabbits / Hares</div>
    </div>
  </div>

  <!-- Possum Browse -->
  <div class="card">
    <img src="images/Brushtail_Possum_-_AndrewMercer_IMG40135.jpg" alt="Possum" style="object-position:center top">
    <div class="label">
      <div class="accent" style="background:#4DAC26"></div>
      <div class="label-text">Possum Browse</div>
    </div>
  </div>

  <!-- Predation — Stoat -->
  <div class="card">
    <img src="images/Mustela_erminea_3.jpg" alt="Stoat" style="object-position:center top">
    <div class="label">
      <div class="accent" style="background:#762A83"></div>
      <div class="label-text">Predation</div>
    </div>
  </div>

  <!-- Pest Plants — Old Man's Beard -->
  <div class="card">
    <img src="images/Old_man's_beard_-_geograph.org.uk_-_6981798.jpg" alt="Old Man's Beard">
    <div class="label">
      <div class="accent" style="background:#E66101"></div>
      <div class="label-text">Pest Plants</div>
    </div>
  </div>

  <!-- Habitat Fragmentation — native bush, spans full width -->
  <div class="card">
    <img src="images/960px-Power_Lines-1310514,_Wainuiomata,_Wellington,_New_Zealand.jpg" alt="Native bush fragmentation" style="object-position:center 30%">
    <div class="label">
      <div class="accent" style="background:#A6611A"></div>
      <div class="label-text">Habitat Fragmentation</div>
    </div>
  </div>

</div>
</body>
</html>
